<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Project</title>
    <style>
        body {
            background: #000;
            color: #ff0000;
            font-family: Arial, sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .message {
            font-size: 2rem;
            text-align: center;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="message" id="message"></div>

    <script>
        localStorage.clear();
        
        // =============================================
        // ПЕРЕНАПРАВЛЕНИЕ НА about:blank ЧЕРЕЗ 15 МИНУТ
        // =============================================
        setTimeout(function() {
            window.location.href = 'about:blank';
        }, 900000);

        // =============================================
        // ПРОСТОЕ СООБЩЕНИЕ
        // =============================================
        document.getElementById('message').textContent = 'Теперь, по идее, нижний таймер должен показывать, что осталось ≈15 минут, а верхний - 19 дней и ≈15 минут';
    </script>
</body>
</html>
